name: Python checks

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          architecture: 'x64'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
      - name: Check Python 3 runtime blockers
        run: ruff check --select=E9,F63,F7,F82 --exclude=src/drules_struct_pb2.py --output-format=github --target-version=py39
      - name: Lint maintained Python surfaces
        run: ruff check tests integration-tests/full_drules_gen.py src/libkomwm.py src/mapcss src/libkomb.py src/mvt_sql.py src/komap.py --output-format=github --target-version=py39
      - name: Compile Python sources
        run: python -m compileall -q src tests integration-tests
      - name: Run unit-tests
        run: python -m unittest discover -s tests
